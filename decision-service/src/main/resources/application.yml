server:
  port: ${DECISION_SERVICE_PORT}

spring:
  application:
    name: decision-service
  datasource:
    url: ${DECISION_SERVICE_DB_URL}
    username: ${DECISION_SERVICE_DB_USERNAME}
    password: ${DECISION_SERVICE_DB_PASSWORD}
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect