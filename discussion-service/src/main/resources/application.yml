server:
  port: ${DISCUSSION_SERVICE_PORT}

spring:
  application:
    name: discussion-service
  datasource:
    url: ${DISCUSSION_SERVICE_DB_URL}
    username: ${DISCUSSION_SERVICE_DB_USERNAME}
    password: ${DISCUSSION_SERVICE_DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect