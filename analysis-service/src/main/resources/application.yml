server:
  port: ${ANALYSIS_SERVICE_PORT}

spring:
  application:
    name: analysis-service
  datasource:
    url: ${ANALYSIS_SERVICE_DB_URL}
    username: ${ANALYSIS_SERVICE_DB_USERNAME}
    password: ${ANALYSIS_SERVICE_DB_PASSWORD}
  jpa:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect